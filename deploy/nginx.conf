# /etc/nginx/sites-available/toko.mdt.biz.id
upstream tokoonline_app {
    server 127.0.0.1:8100;
    keepalive 32;
}

# HTTP -> HTTPS (Cloudflare proxy will handle external 443)
server {
    listen 80;
    listen [::]:80;
    server_name toko.mdt.biz.id;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name toko.mdt.biz.id;

    ssl_certificate     /etc/letsencrypt/live/toko.mdt.biz.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/toko.mdt.biz.id/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Real client IP from Cloudflare
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    client_max_body_size 60M;
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml application/xml text/xml;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Static assets — short browser cache (1h) + cache-busting via ?v=hash query string.
    # Long cache only when query string is present.
    location ~* ^/(static|uploads)/.*\.(jpg|jpeg|png|webp|avif|svg|gif|ico|css|js|woff2?)$ {
        proxy_pass http://tokoonline_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        # Make query string part of CF/cache key — adding ?v=X gives a fresh URL
        # immediately after redeploy. Without query string, only 1h browser cache.
        if ($args = "") {
            add_header Cache-Control "public, max-age=3600, must-revalidate";
        }
        if ($args != "") {
            add_header Cache-Control "public, max-age=2592000, immutable";
        }
        access_log off;
    }

    location / {
        proxy_pass http://tokoonline_app;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
